# ==========================================
# PurchaseIQ v2.0 - Application Config
# Uses H2 embedded DB (no setup needed!)
# ==========================================

server.port=8080

# ==========================================
# H2 In-Memory Database (zero setup)
# ==========================================
spring.datasource.url=jdbc:h2:file:./purchaseiq_data;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# Scraping Configuration
# Target: books.toscrape.com (legal sandbox)
# ==========================================
scraper.base-url=https://books.toscrape.com
scraper.delay.ms=1000
scraper.timeout.ms=15000
scraper.max-pages=5
scraper.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36

# ==========================================
# CORS - Allow frontend to call backend
# ==========================================
app.cors.allowed-origins=http://127.0.0.1:5500,http://localhost:5500,http://localhost:3000,http://localhost:8080

# ==========================================
# Logging
# ==========================================
logging.level.com.purchaseiq=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
